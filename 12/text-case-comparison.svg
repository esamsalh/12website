  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f9f8ff"/><stop offset="1" stop-color="#ece9ff"/></linearGradient><linearGradient id="p" x1="0" x2="1"><stop stop-color="#776aef"/><stop offset="1" stop-color="#5548ce"/></linearGradient></defs>
  <rect x="8" y="8" width="944" height="344" rx="42" fill="url(#bg)" stroke="#dcd8f6" stroke-width="2"/>
