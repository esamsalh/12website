<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
<title id="title">تحويل XML إلى JSON</title><desc id="desc">مخطط عربي يربط شجرة عناصر XML بكائن JSON مع الحفاظ على السمات والمصفوفات.</desc>
